<h1 id="babel-code-frame"><a href="#babel-code-frame" class="headerlink" title="@babel/code-frame"></a>@babel/code-frame</h1><blockquote>
<p>Generate errors that contain a code frame that point to source locations.</p>
</blockquote>
<p>See our website <a href="https://babeljs.io/docs/en/babel-code-frame">@babel/code-frame</a> for more information.</p>
<h2 id="Install"><a href="#Install" class="headerlink" title="Install"></a>Install</h2><p>Using npm:</p>
<pre><code class="sh">npm install --save-dev @babel/code-frame
</code></pre>
<p>or using yarn:</p>
<pre><code class="sh">yarn add @babel/code-frame --dev
</code></pre>
