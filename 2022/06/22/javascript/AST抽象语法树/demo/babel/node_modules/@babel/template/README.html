<h1 id="babel-template"><a href="#babel-template" class="headerlink" title="@babel/template"></a>@babel/template</h1><blockquote>
<p>Generate an AST from a string template.</p>
</blockquote>
<p>See our website <a href="https://babeljs.io/docs/en/babel-template">@babel/template</a> for more information or the <a href="https://github.com/babel/babel/issues?utf8=%E2%9C%93&q=is:issue+label:%22pkg:%20template%22+is:open">issues</a> associated with this package.</p>
<h2 id="Install"><a href="#Install" class="headerlink" title="Install"></a>Install</h2><p>Using npm:</p>
<pre><code class="sh">npm install --save-dev @babel/template
</code></pre>
<p>or using yarn:</p>
<pre><code class="sh">yarn add @babel/template --dev
</code></pre>
