<h1 id="babel-highlight"><a href="#babel-highlight" class="headerlink" title="@babel/highlight"></a>@babel/highlight</h1><blockquote>
<p>Syntax highlight JavaScript strings for output in terminals.</p>
</blockquote>
<p>See our website <a href="https://babeljs.io/docs/en/babel-highlight">@babel/highlight</a> for more information.</p>
<h2 id="Install"><a href="#Install" class="headerlink" title="Install"></a>Install</h2><p>Using npm:</p>
<pre><code class="sh">npm install --save-dev @babel/highlight
</code></pre>
<p>or using yarn:</p>
<pre><code class="sh">yarn add @babel/highlight --dev
</code></pre>
