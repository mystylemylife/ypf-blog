<h1 id="babel-types"><a href="#babel-types" class="headerlink" title="@babel/types"></a>@babel/types</h1><blockquote>
<p>Babel Types is a Lodash-esque utility library for AST nodes</p>
</blockquote>
<p>See our website <a href="https://babeljs.io/docs/en/babel-types">@babel/types</a> for more information or the <a href="https://github.com/babel/babel/issues?utf8=%E2%9C%93&q=is:issue+label:%22pkg:%20types%22+is:open">issues</a> associated with this package.</p>
<h2 id="Install"><a href="#Install" class="headerlink" title="Install"></a>Install</h2><p>Using npm:</p>
<pre><code class="sh">npm install --save-dev @babel/types
</code></pre>
<p>or using yarn:</p>
<pre><code class="sh">yarn add @babel/types --dev
</code></pre>
