<h1 id="babel-generator"><a href="#babel-generator" class="headerlink" title="@babel/generator"></a>@babel/generator</h1><blockquote>
<p>Turns an AST into code.</p>
</blockquote>
<p>See our website <a href="https://babeljs.io/docs/en/babel-generator">@babel/generator</a> for more information or the <a href="https://github.com/babel/babel/issues?utf8=%E2%9C%93&q=is:issue+label:%22pkg:%20generator%22+is:open">issues</a> associated with this package.</p>
<h2 id="Install"><a href="#Install" class="headerlink" title="Install"></a>Install</h2><p>Using npm:</p>
<pre><code class="sh">npm install --save-dev @babel/generator
</code></pre>
<p>or using yarn:</p>
<pre><code class="sh">yarn add @babel/generator --dev
</code></pre>
