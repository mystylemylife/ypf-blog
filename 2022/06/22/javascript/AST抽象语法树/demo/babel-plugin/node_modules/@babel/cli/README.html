<h1 id="babel-cli"><a href="#babel-cli" class="headerlink" title="@babel/cli"></a>@babel/cli</h1><blockquote>
<p>Babel command line.</p>
</blockquote>
<p>See our website <a href="https://babeljs.io/docs/en/babel-cli">@babel/cli</a> for more information or the <a href="https://github.com/babel/babel/issues?utf8=%E2%9C%93&q=is:issue+label:%22pkg:%20cli%22+is:open">issues</a> associated with this package.</p>
<h2 id="Install"><a href="#Install" class="headerlink" title="Install"></a>Install</h2><p>Using npm:</p>

</code></pre>
<p>or using yarn:</p>
<pre><code class="sh">yarn add @babel/cli --dev
</code></pre>
